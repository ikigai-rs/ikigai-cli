[package]
name = "ikigai-web"
description = "Inbound HTTP transport: serve an ikigai kernel over HTTP. Maps HTTP methodâ†”verb, Acceptâ†”conneg, pathâ†”iri, and a capability-per-request (the multi-tenant door). A thin adapter â€” app logic stays in resources/compositions/caps."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The kernel it serves.
ikigai-core = { workspace = true }
# Minimal async I/O for the accept loop + per-connection handler (hand-rolled HTTP/1.1,
# mirroring ikigai-cms-web's serve_http â€” Apache fronts it, so parsing stays small).
tokio = { version = "1", features = ["net", "io-util", "rt", "rt-multi-thread", "macros", "time"] }
# Strong ETag = a content hash of the representation (type + bytes). Same hash family
# core uses for content addressing; keeps the validator stable and collision-resistant.
blake3 = "1"
# The first PATCH strategy: RFC 7386 JSON Merge Patch over serde_json values.
serde_json = "1"

[dev-dependencies]
futures = { workspace = true }
