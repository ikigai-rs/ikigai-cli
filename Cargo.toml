[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Brian Sletten <brian.sletten@gmail.com>"]
repository = "https://github.com/ikigai-rs/ikigai-cli"
homepage = "https://github.com/ikigai-rs/ikigai-cli"

[workspace.dependencies]
# Released core is consumed from crates.io once published:
#   ikigai-core = "0.0"
# For local cross-repo development, use .cargo/config.toml (see .cargo/config.toml.example).
