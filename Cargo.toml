[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Brian Sletten <brian.sletten@gmail.com>"]
repository = "https://github.com/ikigai-rs/ikigai-cli"
homepage = "https://github.com/ikigai-rs/ikigai-cli"

[workspace.dependencies]
# The released kernel, consumed from crates.io. For local cross-repo development
# against a sibling checkout, use .cargo/config.toml (see .cargo/config.toml.example).
ikigai-core = "0.1.7"  # capability attenuation + serde (capability-on-the-wire)
ikigai-vocab = "0.1"
# The reusable function library, linked in as a published module crate.
ikigai-fn = "0.1.0"
# Personal contexts (urn:personal:*), macOS-backed, linked as a published module.
ikigai-personal = "0.1.0"
# Capability-gated file/store module, linked as a published module crate.
ikigai-fs = "0.1.0"
ikigai-resolve = { path = "crates/ikigai-resolve", version = "0.1.0" }
ikigai-wire = { path = "crates/ikigai-wire", version = "0.1.0" }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", features = ["use-std"] }
libc = "0.2"
