<svg viewBox="0 0 680 392" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
<title>Transport callback — distributed re-entrancy parks, never blocks</title>
<desc>Node A issues a request to Node B over the transport, then parks and frees its thread. B needs a resource that lives on A, so it calls back; A resolves it and replies; B parks its thread while waiting. A's reply lets B resume and reply, and A finishes. No thread is held across any round-trip, so there is no distributed deadlock.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.hd{font:600 13px ui-monospace,Menlo,monospace}
.ll{stroke:#B4B2A9;stroke-width:1.5;stroke-dasharray:4 4}
.msg{stroke:#534AB7;stroke-width:1.6;fill:none}
.ml{font:11.5px ui-monospace,Menlo,monospace;fill:#26215C}
.nt{font:11px -apple-system,system-ui,sans-serif;fill:#5F5E5A}
.pk{font:10.5px ui-monospace,Menlo,monospace;fill:#173404}
</style>

<rect x="65" y="44" width="150" height="30" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.3"/>
<text class="hd" x="140" y="64" text-anchor="middle" fill="#2C2C2A">Node A (pool)</text>
<rect x="465" y="44" width="150" height="30" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.3"/>
<text class="hd" x="540" y="64" text-anchor="middle" fill="#2C2C2A">Node B (pool)</text>
<text class="nt" x="340" y="64" text-anchor="middle" font-style="italic">transport (bidi)</text>

<line class="ll" x1="140" y1="80" x2="140" y2="338"/>
<line class="ll" x1="540" y1="80" x2="540" y2="338"/>

<text class="ml" x="340" y="116" text-anchor="middle">issue urn:x</text>
<line class="msg" x1="148" y1="122" x2="532" y2="122" marker-end="url(#ar)"/>

<rect x="80" y="138" width="120" height="22" rx="11" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.1"/>
<text class="pk" x="140" y="153" text-anchor="middle">PARK · A freed</text>
<text class="nt" x="532" y="153" text-anchor="end">needs urn:y (lives on A)</text>

<text class="ml" x="340" y="186" text-anchor="middle">callback: issue urn:y</text>
<line class="msg" x1="532" y1="192" x2="148" y2="192" marker-end="url(#ar)"/>

<rect x="480" y="208" width="120" height="22" rx="11" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.1"/>
<text class="pk" x="540" y="223" text-anchor="middle">PARK · B freed</text>
<text class="nt" x="148" y="223" text-anchor="start">resolve y on A</text>

<text class="ml" x="340" y="256" text-anchor="middle">reply urn:y</text>
<line class="msg" x1="148" y1="262" x2="532" y2="262" marker-end="url(#ar)"/>

<text class="nt" x="532" y="291" text-anchor="end">resume x on B</text>
<text class="ml" x="340" y="306" text-anchor="middle">reply urn:x → DONE</text>
<line class="msg" x1="532" y1="312" x2="148" y2="312" marker-end="url(#ar)"/>

<text class="pk" x="40" y="368" fill="#3B6D11">No thread is held across a round-trip on either node → no distributed deadlock. The capability threads through each callback.</text>
</svg>
