<svg viewBox="0 0 680 472" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
<title>ikigai scheduler — layered architecture</title>
<desc>The host submits work to a host-side Scheduler, which drives the runtime-free Kernel's async futures; the Kernel resolves and invokes endpoints over resources, re-entrantly. The only seam change: the Resolver submits to the scheduler instead of block_on.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font:600 16px -apple-system,system-ui,sans-serif}
.s{font:12.5px ui-monospace,Menlo,monospace;fill:#5F5E5A}
.e{stroke:#5F5E5A;stroke-width:1.5;fill:none}
.el{font:11px ui-monospace,Menlo,monospace;fill:#5F5E5A}
.bdg{font:10.5px ui-monospace,Menlo,monospace}
</style>

<rect x="60" y="24" width="560" height="62" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="340" y="50" text-anchor="middle" fill="#2C2C2A">Host</text>
<text class="s" x="340" y="71" text-anchor="middle">CLI REPL · IPC/QUIC/WebTransport server · browser · WASI</text>

<line class="e" x1="300" y1="86" x2="300" y2="126" marker-end="url(#ar)"/>
<text class="el" x="292" y="110" text-anchor="end">submit(task)</text>
<line class="e" x1="380" y1="126" x2="380" y2="86" marker-end="url(#ar)"/>
<text class="el" x="388" y="110">result</text>

<rect x="60" y="126" width="560" height="64" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text class="t" x="340" y="153" text-anchor="middle" fill="#412402">Scheduler · host-side, pluggable</text>
<text class="s" x="340" y="174" text-anchor="middle">work queue · pool · priorities · per-resource executors</text>

<line class="e" x1="340" y1="190" x2="340" y2="232" marker-end="url(#ar)"/>
<text class="el" x="348" y="215">drive futures — poll / park / wake</text>

<rect x="60" y="232" width="560" height="74" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text class="t" x="340" y="260" text-anchor="middle" fill="#26215C">ikigai-core Kernel</text>
<text class="s" x="340" y="281" text-anchor="middle">resolve (sync routing) → invoke · content-addressed cache</text>
<rect x="470" y="240" width="142" height="20" rx="6" fill="#fff" stroke="#534AB7" stroke-width="1"/>
<text class="bdg" x="541" y="254" text-anchor="middle" fill="#26215C">runtime-free</text>
<path class="e" d="M612 296 q26 0 26 -26 q0 -22 -26 -22" marker-end="url(#ar)"/>
<text class="el" x="628" y="300" text-anchor="end">re-entrant: Invocation::issue()</text>

<line class="e" x1="340" y1="306" x2="340" y2="348" marker-end="url(#ar)"/>
<text class="el" x="348" y="331">invoke (async)</text>

<rect x="60" y="348" width="560" height="74" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="376" text-anchor="middle" fill="#04342C">Resources / endpoints</text>
<text class="s" x="340" y="397" text-anchor="middle">CPU · fs/localStorage · HTTP (ureq|reqwest|fetch)</text>
<text class="s" x="340" y="414" text-anchor="middle">GPU (wgpu|WebGPU) · remote kernel (QUIC|IPC|WebTransport)</text>

<text class="el" x="60" y="446">Only seam change: the Resolver submits to the Scheduler instead of block_on — the Kernel is untouched.</text>
</svg>
