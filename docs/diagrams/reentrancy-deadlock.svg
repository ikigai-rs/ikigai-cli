<svg viewBox="0 0 680 348" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
<title>Re-entrant compose on one thread — block_on deadlocks, async scheduling does not</title>
<desc>With one pool thread and block_on, a parent compose task blocks the thread waiting for its child, so the child can never attach to a thread and the system deadlocks. With async scheduling, the parent parks and releases its thread, the freed thread runs the child, and the parent is woken to finish.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.h{font:600 14px ui-monospace,Menlo,monospace}
.bx{font:12.5px ui-monospace,Menlo,monospace}
.e{stroke:#5F5E5A;stroke-width:1.5;fill:none}
.out{font:700 18px -apple-system,system-ui,sans-serif}
</style>

<rect x="20" y="20" width="300" height="300" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
<text class="h" x="170" y="48" text-anchor="middle" fill="#791F1F">block_on · pool = 1 thread</text>

<rect x="50" y="70" width="240" height="38" rx="8" fill="#fff" stroke="#A32D2D" stroke-width="1.2"/>
<text class="bx" x="170" y="94" text-anchor="middle" fill="#501313">T1: compose runs</text>
<line class="e" x1="170" y1="108" x2="170" y2="142" marker-end="url(#ar)"/>
<text class="bx" x="182" y="130" fill="#791F1F">block — wait for child</text>

<rect x="50" y="142" width="240" height="38" rx="8" fill="#fff" stroke="#A32D2D" stroke-width="1.2"/>
<text class="bx" x="170" y="166" text-anchor="middle" fill="#501313">child: QUEUED — no free thread</text>

<text class="out" x="170" y="240" text-anchor="middle" fill="#A32D2D">DEADLOCK</text>
<text class="bx" x="170" y="266" text-anchor="middle" fill="#791F1F">T1 held by the parent;</text>
<text class="bx" x="170" y="284" text-anchor="middle" fill="#791F1F">nothing left to run the child</text>

<rect x="360" y="20" width="300" height="300" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
<text class="h" x="510" y="48" text-anchor="middle" fill="#27500A">async scheduling · pool = 1</text>

<rect x="390" y="70" width="240" height="38" rx="8" fill="#fff" stroke="#3B6D11" stroke-width="1.2"/>
<text class="bx" x="510" y="94" text-anchor="middle" fill="#173404">T1: compose runs</text>
<line class="e" x1="510" y1="108" x2="510" y2="142" marker-end="url(#ar)"/>
<text class="bx" x="522" y="130" fill="#3B6D11">await — PARK (T1 freed)</text>

<rect x="390" y="142" width="240" height="38" rx="8" fill="#fff" stroke="#3B6D11" stroke-width="1.2"/>
<text class="bx" x="510" y="166" text-anchor="middle" fill="#173404">T1 (free) runs child → result</text>
<line class="e" x1="510" y1="180" x2="510" y2="214" marker-end="url(#ar)"/>
<text class="bx" x="522" y="202" fill="#3B6D11">wake parent</text>

<rect x="390" y="214" width="240" height="38" rx="8" fill="#fff" stroke="#3B6D11" stroke-width="1.2"/>
<text class="bx" x="510" y="238" text-anchor="middle" fill="#173404">compose resumes → DONE</text>

<text class="out" x="510" y="292" text-anchor="middle" fill="#3B6D11">✓ parent yields, child runs</text>
</svg>
